<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
<title>Kittiwalk — Tromsø</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#16232F">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.css" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --fjord-ink:#16232F;
    --glacier:#F4F8FA;
    --tide:#2C6E8E;
    --tide-dark:#1E4F68;
    --stone:#7C8794;
    --stone-light:#D7DEE3;
    --kittiwake:#F2A93B;
    --kittiwake-dark:#D6902A;
    --cliff:#22262B;
    --ok:#4C8C6B;
    --danger:#C0533E;
    --sheet-radius:20px;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{height:100%; margin:0; padding:0; overscroll-behavior:none;}
  body{
    font-family:'Inter',sans-serif;
    background:var(--glacier);
    color:var(--fjord-ink);
    display:flex;
    flex-direction:column;
    height:100vh;
    width:100vw;
    overflow:hidden;
  }

  /* ---------- HEADER ---------- */
  header{
    position:absolute; top:0; left:0; right:0; z-index:1000;
    display:flex; align-items:center; justify-content:space-between;
    padding:14px 16px;
    pointer-events:none;
  }
  .brand{
    pointer-events:auto;
    background:rgba(22,35,47,0.92);
    backdrop-filter: blur(6px);
    color:#fff;
    padding:9px 14px;
    border-radius:999px;
    display:flex;
    align-items:center;
    gap:8px;
    font-family:'Space Grotesk',sans-serif;
    font-weight:600;
    font-size:14.5px;
    box-shadow:0 4px 14px rgba(0,0,0,0.25);
  }
  .brand .dot{width:8px;height:8px;border-radius:50%;background:var(--kittiwake);}
  .stat-pill{
    pointer-events:auto;
    background:#fff;
    color:var(--fjord-ink);
    padding:8px 12px;
    border-radius:999px;
    font-family:'JetBrains Mono',monospace;
    font-size:12.5px;
    font-weight:500;
    box-shadow:0 4px 14px rgba(0,0,0,0.15);
    border:1px solid var(--stone-light);
  }
  .stat-pill b{color:var(--tide);}

  /* ---------- MAP ---------- */
  #map{flex:1; width:100%; height:100%;}
  .leaflet-container{background:#DCE6EA;}

  /* Station marker (bird-ring tag style) */
  .station-marker{
    width:34px; height:34px;
    border-radius:50%;
    background:var(--cliff);
    border:3px solid #fff;
    box-shadow:0 3px 8px rgba(0,0,0,0.35);
    display:flex; align-items:center; justify-content:center;
    font-family:'JetBrains Mono',monospace;
    font-size:10px; font-weight:600;
    color:#fff;
    transition:transform .15s ease;
  }
  .station-marker.done{background:var(--ok);}
  .station-marker:active{transform:scale(0.92);}

  .user-dot-outer{
    width:22px;height:22px;border-radius:50%;
    background:rgba(44,110,142,0.25);
    display:flex;align-items:center;justify-content:center;
  }
  .user-dot-inner{
    width:14px;height:14px;border-radius:50%;
    background:var(--tide);
    border:2.5px solid #fff;
    box-shadow:0 0 0 2px rgba(44,110,142,0.4);
  }

  /* ---------- FLOATING BUTTONS ---------- */
  .fab{
    position:absolute; z-index:1000;
    width:52px; height:52px;
    border-radius:50%;
    border:none;
    display:flex; align-items:center; justify-content:center;
    box-shadow:0 6px 16px rgba(0,0,0,0.3);
    cursor:pointer;
    font-size:22px;
  }
  #locateBtn{
    bottom:26px; right:16px;
    background:#fff;
    color:var(--tide);
  }
  #anomalyBtn{
    bottom:26px; left:16px;
    background:var(--kittiwake);
    color:var(--fjord-ink);
    width:auto;
    border-radius:999px;
    padding:0 18px;
    height:52px;
    font-family:'Space Grotesk',sans-serif;
    font-weight:600;
    font-size:14px;
    gap:8px;
  }
  #exportBtn{
    bottom:90px; left:16px;
    background:var(--fjord-ink);
    color:#fff;
    width:auto;
    border-radius:999px;
    padding:0 16px;
    height:40px;
    font-family:'Space Grotesk',sans-serif;
    font-weight:500;
    font-size:12.5px;
  }

  /* ---------- BOTTOM SHEET ---------- */
  .sheet-backdrop{
    position:fixed; inset:0; z-index:1900;
    background:rgba(15,25,33,0.45);
    opacity:0; pointer-events:none;
    transition:opacity .25s ease;
  }
  .sheet-backdrop.open{opacity:1; pointer-events:auto;}

  .sheet{
    position:fixed; left:0; right:0; bottom:0; z-index:2000;
    background:var(--glacier);
    border-radius:var(--sheet-radius) var(--sheet-radius) 0 0;
    max-height:88vh;
    overflow-y:auto;
    transform:translateY(105%);
    transition:transform .28s cubic-bezier(.32,.72,0,1);
    box-shadow:0 -8px 30px rgba(0,0,0,0.25);
    padding-bottom:24px;
  }
  .sheet.open{transform:translateY(0);}
  .sheet-handle{
    width:40px; height:5px; background:var(--stone-light);
    border-radius:3px; margin:12px auto 4px;
  }
  .sheet-header{
    padding:8px 20px 4px;
    display:flex; align-items:center; justify-content:space-between;
  }
  .sheet-header h2{
    font-family:'Space Grotesk',sans-serif;
    font-size:20px; margin:0;
    display:flex; align-items:center; gap:10px;
  }
  .station-badge{
    font-family:'JetBrains Mono',monospace;
    background:var(--cliff); color:#fff;
    padding:5px 13px; border-radius:10px; font-size:20px; font-weight:700;
  }
  .close-x{
    background:var(--stone-light); border:none; width:32px; height:32px;
    border-radius:50%; font-size:16px; color:var(--fjord-ink); cursor:pointer;
  }
  .sheet-sub{padding:0 20px; color:var(--stone); font-size:13px; margin-top:2px;}

  .form-body{padding:16px 20px 4px;}
  .field{margin-bottom:16px;}
  .field label{
    display:block; font-size:13.5px; font-weight:700; text-transform:uppercase;
    letter-spacing:.04em; color:var(--stone); margin-bottom:8px;
  }
  .field.compact label{font-size:12px; font-weight:600;}
  .char-count{
    float:right; font-family:'JetBrains Mono',monospace; font-weight:400;
    text-transform:none; letter-spacing:0; color:var(--stone);
  }
  .counter-row{display:flex; align-items:center; gap:16px;}
  .counter-row button{
    width:56px; height:56px; border-radius:14px; border:1.5px solid var(--stone-light);
    background:#fff; font-size:26px; color:var(--tide); cursor:pointer; font-weight:700;
    flex-shrink:0;
  }
  .counter-row button:active{background:var(--stone-light);}
  .counter-row input{
    width:90px; text-align:center; font-family:'JetBrains Mono',monospace;
    font-size:36px; font-weight:700; border:none; background:transparent;
    color:var(--fjord-ink);
  }
  .field.compact .counter-row button{width:44px;height:44px;font-size:20px;border-radius:11px;}
  .field.compact .counter-row input{font-size:26px; width:70px;}
  textarea{
    width:100%; border:1px solid var(--stone-light); border-radius:10px;
    padding:10px 12px; font-family:'Inter'; font-size:14px; resize:vertical; min-height:60px;
    background:#fff;
  }
  .photo-input{
    display:flex; align-items:center; gap:10px; flex-wrap:wrap;
  }
  .photo-add{
    width:64px; height:64px; border-radius:12px; border:1.5px dashed var(--stone);
    display:flex; align-items:center; justify-content:center; font-size:22px;
    color:var(--stone); cursor:pointer; background:#fff; flex-shrink:0;
  }
  .photo-thumb{
    width:64px; height:64px; border-radius:12px; object-fit:cover; flex-shrink:0;
    border:1px solid var(--stone-light);
  }
  .submit-btn{
    width:calc(100% - 40px); margin:8px 20px 0;
    background:var(--tide); color:#fff; border:none;
    padding:15px; border-radius:14px;
    font-family:'Space Grotesk',sans-serif; font-weight:600; font-size:15.5px;
    cursor:pointer;
  }
  .submit-btn:active{background:var(--tide-dark);}
  .submit-btn.anomaly{background:var(--danger);}
  .toast{
    position:fixed; bottom:30px; left:50%; transform:translateX(-50%);
    background:var(--fjord-ink); color:#fff; padding:12px 20px; border-radius:999px;
    font-size:13.5px; z-index:3000; opacity:0; pointer-events:none;
    transition:opacity .25s ease, transform .25s ease;
    font-family:'Space Grotesk',sans-serif;
  }
  .toast.show{opacity:1; transform:translateX(-50%) translateY(-6px);}

  .empty-note{
    font-size:12px; color:var(--stone); padding:0 20px; margin-top:-6px;
  }

  /* ---------- MODE COMPTEUR (clicker) ---------- */
  .tally-btn{
    height:56px; padding:0 16px; border-radius:14px; border:none;
    background:var(--kittiwake); color:var(--fjord-ink);
    font-family:'Space Grotesk',sans-serif; font-weight:700; font-size:14px;
    cursor:pointer; flex-shrink:0;
  }
  .field.compact .tally-btn{display:none;}
  #tallyOverlay{
    position:fixed; inset:0; z-index:5000;
    background:var(--fjord-ink);
    display:none;
    flex-direction:column;
    color:#fff;
  }
  #tallyOverlay.open{display:flex;}
  .tally-header{
    display:flex; justify-content:space-between; align-items:center;
    padding:18px 20px;
  }
  .tally-header .what{
    font-family:'Space Grotesk',sans-serif; font-weight:600; font-size:16px;
    display:flex; align-items:center; gap:10px;
  }
  .tally-cancel{
    background:rgba(255,255,255,0.12); border:none; color:#fff;
    padding:10px 16px; border-radius:999px; font-size:14px; cursor:pointer;
    font-family:'Space Grotesk',sans-serif;
  }
  .tally-zone{
    flex:1;
    display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    cursor:pointer;
    user-select:none;
    -webkit-user-select:none;
    touch-action:manipulation;
  }
  .tally-zone:active .tally-count{transform:scale(1.06);}
  .tally-count{
    font-family:'JetBrains Mono',monospace;
    font-size:120px; font-weight:700; line-height:1;
    transition:transform .08s ease;
  }
  .tally-hint{
    margin-top:18px; color:rgba(255,255,255,0.55); font-size:15px;
    font-family:'Space Grotesk',sans-serif;
  }
  .tally-actions{
    display:flex; gap:12px; padding:0 20px 34px;
  }
  .tally-actions button{
    flex:1; padding:18px; border-radius:16px; border:none;
    font-family:'Space Grotesk',sans-serif; font-weight:700; font-size:16px;
    cursor:pointer;
  }
  .tally-undo{background:rgba(255,255,255,0.12); color:#fff;}
  .tally-done{background:var(--kittiwake); color:var(--fjord-ink);}
</style>
</head>
<body>

<header>
  <div class="brand"><span class="dot"></span> Kittiwalk</div>
  <div class="stat-pill"><b id="doneCount">0</b>/<span id="totalCount">43</span> stations</div>
</header>

<div id="map"></div>

<button class="fab" id="locateBtn" title="Me localiser">📍</button>
<button class="fab" id="anomalyBtn" title="Signaler une anomalie">📷 Signaler</button>
<button class="fab" id="exportBtn" title="Exporter les données">⬇ Exporter (JSON)</button>

<div class="sheet-backdrop" id="backdrop"></div>

<!-- Sheet: observation de station -->
<div class="sheet" id="stationSheet">
  <div class="sheet-handle"></div>
  <div class="sheet-header">
    <h2>Station <span class="station-badge" id="stationLabel">--</span></h2>
    <button class="close-x" id="closeStation">✕</button>
  </div>
  <div class="sheet-sub" id="stationSub">Observation du jour</div>
  <div class="form-body">
    <div class="field compact">
      <label>Observateurs présents</label>
      <div class="counter-row">
        <button type="button" data-target="observers" data-delta="-1">–</button>
        <input type="number" id="observersInput" value="1" inputmode="numeric" min="1">
        <button type="button" data-target="observers" data-delta="1">+</button>
      </div>
    </div>
    <div class="field">
      <label>Adultes présents</label>
      <div class="counter-row">
        <button type="button" data-target="adults" data-delta="-1">–</button>
        <input type="number" id="adultsInput" value="0" inputmode="numeric" min="0">
        <button type="button" data-target="adults" data-delta="1">+</button>
        <button type="button" class="tally-btn" data-tally="adults">👆 Compter</button>
      </div>
    </div>
    <div class="field">
      <label>Nids apparemment occupés (AON)</label>
      <div class="counter-row">
        <button type="button" data-target="aon" data-delta="-1">–</button>
        <input type="number" id="aonInput" value="0" inputmode="numeric" min="0">
        <button type="button" data-target="aon" data-delta="1">+</button>
        <button type="button" class="tally-btn" data-tally="aon">👆 Compter</button>
      </div>
    </div>
    <div class="field">
      <label>Photo(s) de la station</label>
      <div class="photo-input" id="stationPhotoRow">
        <label class="photo-add">＋<input type="file" accept="image/*" capture="environment" multiple style="display:none" id="stationPhotoFile"></label>
      </div>
    </div>
    <div class="field">
      <label>Remarques (optionnel) <span class="char-count" id="stationCharCount">0/100</span></label>
      <textarea id="stationNotes" maxlength="100" placeholder="Comportement, météo, dérangement..."></textarea>
    </div>
  </div>
  <button class="submit-btn" id="saveStation">Enregistrer l'observation</button>
</div>

<!-- Sheet: signalement anomalie -->
<div class="sheet" id="anomalySheet">
  <div class="sheet-handle"></div>
  <div class="sheet-header">
    <h2>Signaler une anomalie</h2>
    <button class="close-x" id="closeAnomaly">✕</button>
  </div>
  <div class="sheet-sub">Oiseau blessé, nid détruit, dérangement, prédateur...</div>
  <div class="form-body">
    <div class="field">
      <label>Station la plus proche</label>
      <select id="anomalyStation" style="width:100%;padding:10px;border-radius:10px;border:1px solid var(--stone-light);font-family:'JetBrains Mono',monospace;background:#fff;"></select>
    </div>
    <div class="field">
      <label>Description</label>
      <textarea id="anomalyNotes" placeholder="Décris ce que tu observes..."></textarea>
    </div>
    <div class="field">
      <label>Photo(s)</label>
      <div class="photo-input" id="anomalyPhotoRow">
        <label class="photo-add">＋<input type="file" accept="image/*" capture="environment" multiple style="display:none" id="anomalyPhotoFile"></label>
      </div>
    </div>
  </div>
  <button class="submit-btn anomaly" id="saveAnomaly">Envoyer le signalement</button>
  <div class="empty-note">Prototype : les photos sont gardées en mémoire de session, pas encore reliées à un Drive.</div>
</div>

<div class="toast" id="toast"></div>

<!-- Overlay compteur clicker -->
<div id="tallyOverlay">
  <div class="tally-header">
    <div class="what"><span class="station-badge" id="tallyStation">--</span> <span id="tallyWhat">Adultes</span></div>
    <button class="tally-cancel" id="tallyCancel">Annuler</button>
  </div>
  <div class="tally-zone" id="tallyZone">
    <div class="tally-count" id="tallyCount">0</div>
    <div class="tally-hint">Touche l'écran à chaque oiseau</div>
  </div>
  <div class="tally-actions">
    <button class="tally-undo" id="tallyUndo">− 1</button>
    <button class="tally-done" id="tallyDone">Valider</button>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.js"></script>
<script>
/* ---------------- DONNÉES DES STATIONS (fusion QGIS 2024/2025) ---------------- */
const STATIONS = [{"station": "01", "lat": 69.647982, "lon": 18.96033}, {"station": "02", "lat": 69.648305, "lon": 18.959777}, {"station": "02b", "lat": 69.648666, "lon": 18.959894}, {"station": "03", "lat": 69.648628, "lon": 18.960329}, {"station": "04", "lat": 69.648661, "lon": 18.961516}, {"station": "06a", "lat": 69.650702, "lon": 18.960079}, {"station": "08", "lat": 69.650555, "lon": 18.958684}, {"station": "08b", "lat": 69.650767, "lon": 18.958919}, {"station": "09", "lat": 69.651979, "lon": 18.962027}, {"station": "10", "lat": 69.652079, "lon": 18.962743}, {"station": "11", "lat": 69.652025, "lon": 18.962372}, {"station": "12", "lat": 69.652449, "lon": 18.96237}, {"station": "13a", "lat": 69.652296, "lon": 18.961903}, {"station": "13b", "lat": 69.652201, "lon": 18.961444}, {"station": "14", "lat": 69.65237, "lon": 18.96045}, {"station": "15", "lat": 69.652456, "lon": 18.958719}, {"station": "16", "lat": 69.650309, "lon": 18.957028}, {"station": "16a", "lat": 69.650144, "lon": 18.955643}, {"station": "16b", "lat": 69.650632, "lon": 18.957665}, {"station": "16c", "lat": 69.650345, "lon": 18.957454}, {"station": "16d", "lat": 69.649902, "lon": 18.955921}, {"station": "17", "lat": 69.650031, "lon": 18.957869}, {"station": "19", "lat": 69.650292, "lon": 18.957953}, {"station": "20b", "lat": 69.649141, "lon": 18.958449}, {"station": "20c", "lat": 69.648985, "lon": 18.958244}, {"station": "20d", "lat": 69.648982, "lon": 18.958965}, {"station": "20e", "lat": 69.648778, "lon": 18.958919}, {"station": "21", "lat": 69.649016, "lon": 18.959806}, {"station": "22", "lat": 69.648759, "lon": 18.956821}, {"station": "24", "lat": 69.646091, "lon": 18.951096}, {"station": "25", "lat": 69.64575, "lon": 18.952222}, {"station": "26b", "lat": 69.645631, "lon": 18.953353}, {"station": "28", "lat": 69.64671, "lon": 18.95564}, {"station": "28b", "lat": 69.64634, "lon": 18.95511}, {"station": "30", "lat": 69.643959, "lon": 18.944063}, {"station": "31", "lat": 69.644116, "lon": 18.943943}, {"station": "31a", "lat": 69.644433, "lon": 18.944733}, {"station": "31b", "lat": 69.644565, "lon": 18.942862}, {"station": "31c", "lat": 69.644696, "lon": 18.942067}, {"station": "32", "lat": 69.644522, "lon": 18.945281}, {"station": "32c", "lat": 69.643741, "lon": 18.945634}, {"station": "33", "lat": 69.642658, "lon": 18.943864}, {"station": "34", "lat": 69.642309, "lon": 18.942534}];

/* ---------------- ÉTAT EN MÉMOIRE (pas de localStorage en artifact) ---------------- */
let observations = {};   // station -> {adults, aon, notes, photos:[dataURL]}
let anomalies = [];      // {station, notes, photos, timestamp}
let currentStation = null;
let stationMarkers = {};
let stationPhotosBuffer = [];
let anomalyPhotosBuffer = [];

/* ---------------- CARTE ---------------- */
const map = L.map('map', { zoomControl:false }).setView(
  [STATIONS.reduce((s,x)=>s+x.lat,0)/STATIONS.length, STATIONS.reduce((s,x)=>s+x.lon,0)/STATIONS.length],
  15
);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom: 19,
  attribution: '&copy; OpenStreetMap contributors'
}).addTo(map);

L.control.zoom({position:'bottomright'}).addTo(map);

function makeStationIcon(code, done){
  return L.divIcon({
    className:'',
    html:`<div class="station-marker ${done?'done':''}">${code}</div>`,
    iconSize:[34,34],
    iconAnchor:[17,17]
  });
}

STATIONS.forEach(st=>{
  const marker = L.marker([st.lat, st.lon], { icon: makeStationIcon(st.station, false) }).addTo(map);
  marker.on('click', ()=> openStationSheet(st.station));
  stationMarkers[st.station] = marker;
});

document.getElementById('totalCount').textContent = STATIONS.length;

/* remplir le select des anomalies */
const anomalySelect = document.getElementById('anomalyStation');
STATIONS.forEach(st=>{
  const opt = document.createElement('option');
  opt.value = st.station; opt.textContent = 'Station ' + st.station;
  anomalySelect.appendChild(opt);
});

/* ---------------- GÉOLOCALISATION (petit point bleu) ---------------- */
let userMarker = null;
function updateUserPosition(lat, lon){
  const icon = L.divIcon({
    className:'',
    html:`<div class="user-dot-outer"><div class="user-dot-inner"></div></div>`,
    iconSize:[22,22], iconAnchor:[11,11]
  });
  if(!userMarker){
    userMarker = L.marker([lat,lon], {icon, zIndexOffset:1000}).addTo(map);
  } else {
    userMarker.setLatLng([lat,lon]);
  }
}

function locateMe(recenter){
  if(!navigator.geolocation){
    showToast("Géolocalisation non disponible sur ce navigateur");
    return;
  }
  navigator.geolocation.getCurrentPosition(pos=>{
    updateUserPosition(pos.coords.latitude, pos.coords.longitude);
    if(recenter) map.setView([pos.coords.latitude, pos.coords.longitude], 17);
  }, err=>{
    showToast("Impossible de te localiser : " + err.message);
  }, {enableHighAccuracy:true});
}

if(navigator.geolocation){
  navigator.geolocation.watchPosition(pos=>{
    updateUserPosition(pos.coords.latitude, pos.coords.longitude);
  }, ()=>{}, {enableHighAccuracy:true});
}

document.getElementById('locateBtn').addEventListener('click', ()=> locateMe(true));

/* ---------------- SHEETS ---------------- */
const backdrop = document.getElementById('backdrop');
const stationSheet = document.getElementById('stationSheet');
const anomalySheet = document.getElementById('anomalySheet');

function openSheet(sheetEl){
  backdrop.classList.add('open');
  sheetEl.classList.add('open');
}
function closeSheets(){
  backdrop.classList.remove('open');
  stationSheet.classList.remove('open');
  anomalySheet.classList.remove('open');
}
backdrop.addEventListener('click', closeSheets);
document.getElementById('closeStation').addEventListener('click', closeSheets);
document.getElementById('closeAnomaly').addEventListener('click', closeSheets);

function openStationSheet(code){
  currentStation = code;
  document.getElementById('stationLabel').textContent = code;
  const existing = observations[code];
  document.getElementById('observersInput').value = existing ? (existing.observers || 1) : 1;
  document.getElementById('adultsInput').value = existing ? existing.adults : 0;
  document.getElementById('aonInput').value = existing ? existing.aon : 0;
  document.getElementById('stationNotes').value = existing ? existing.notes : '';
  updateCharCount();
  stationPhotosBuffer = existing ? [...existing.photos] : [];
  renderPhotoRow('stationPhotoRow', stationPhotosBuffer, 'stationPhotoFile');
  document.getElementById('stationSub').textContent = existing
    ? 'Déjà observée aujourd\'hui — tu peux corriger'
    : 'Nouvelle observation';
  openSheet(stationSheet);
}

document.getElementById('anomalyBtn').addEventListener('click', ()=>{
  anomalyPhotosBuffer = [];
  document.getElementById('anomalyNotes').value = '';
  renderPhotoRow('anomalyPhotoRow', anomalyPhotosBuffer, 'anomalyPhotoFile');
  if(currentStation) anomalySelect.value = currentStation;
  openSheet(anomalySheet);
});

/* ---------------- COMPTEURS +/- ---------------- */
document.querySelectorAll('.counter-row button').forEach(btn=>{
  btn.addEventListener('click', ()=>{
    const target = btn.dataset.target;
    const input = document.getElementById(target+'Input');
    const min = target === 'observers' ? 1 : 0;
    let val = parseInt(input.value||'0') + parseInt(btn.dataset.delta);
    if(val < min) val = min;
    input.value = val;
  });
});

function updateCharCount(){
  const len = document.getElementById('stationNotes').value.length;
  document.getElementById('stationCharCount').textContent = len + '/100';
}
document.getElementById('stationNotes').addEventListener('input', updateCharCount);

/* saisie directe : nettoyer les valeurs invalides à la sortie du champ */
['observersInput','adultsInput','aonInput'].forEach(id=>{
  const el = document.getElementById(id);
  el.addEventListener('blur', ()=>{
    const min = id === 'observersInput' ? 1 : 0;
    let v = parseInt(el.value);
    if(isNaN(v) || v < min) v = min;
    el.value = v;
  });
  el.addEventListener('focus', ()=> el.select());
});

/* ---------------- MODE COMPTEUR (clicker) ---------------- */
let tallyTarget = null;
let tallyValue = 0;
const tallyOverlay = document.getElementById('tallyOverlay');
const tallyCountEl = document.getElementById('tallyCount');

document.querySelectorAll('.tally-btn').forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tallyTarget = btn.dataset.tally;
    tallyValue = parseInt(document.getElementById(tallyTarget+'Input').value||'0');
    tallyCountEl.textContent = tallyValue;
    document.getElementById('tallyStation').textContent = currentStation || '--';
    document.getElementById('tallyWhat').textContent = tallyTarget === 'adults' ? 'Adultes' : 'Nids occupés';
    tallyOverlay.classList.add('open');
  });
});

document.getElementById('tallyZone').addEventListener('click', ()=>{
  tallyValue++;
  tallyCountEl.textContent = tallyValue;
  if(navigator.vibrate) navigator.vibrate(15);
});

document.getElementById('tallyUndo').addEventListener('click', ()=>{
  if(tallyValue > 0) tallyValue--;
  tallyCountEl.textContent = tallyValue;
  if(navigator.vibrate) navigator.vibrate([10,30,10]);
});

document.getElementById('tallyDone').addEventListener('click', ()=>{
  document.getElementById(tallyTarget+'Input').value = tallyValue;
  tallyOverlay.classList.remove('open');
  showToast(tallyValue + (tallyTarget==='adults'?' adultes comptés':' nids comptés'));
});

document.getElementById('tallyCancel').addEventListener('click', ()=>{
  tallyOverlay.classList.remove('open');
});

/* ---------------- PHOTOS (en mémoire, base64) ---------------- */
function renderPhotoRow(rowId, buffer, fileInputId){
  const row = document.getElementById(rowId);
  const addLabel = row.querySelector('.photo-add').parentElement || row.querySelector('label.photo-add');
  row.innerHTML = '';
  buffer.forEach((src, i)=>{
    const img = document.createElement('img');
    img.className='photo-thumb'; img.src = src;
    img.addEventListener('click', ()=>{ buffer.splice(i,1); renderPhotoRow(rowId, buffer, fileInputId); });
    row.appendChild(img);
  });
  const addBtn = document.createElement('label');
  addBtn.className='photo-add';
  addBtn.innerHTML = '＋<input type="file" accept="image/*" capture="environment" multiple style="display:none" id="'+fileInputId+'">';
  row.appendChild(addBtn);
  document.getElementById(fileInputId).addEventListener('change', (e)=>{
    [...e.target.files].forEach(file=>{
      const reader = new FileReader();
      reader.onload = ()=>{ buffer.push(reader.result); renderPhotoRow(rowId, buffer, fileInputId); };
      reader.readAsDataURL(file);
    });
  });
}
renderPhotoRow('stationPhotoRow', stationPhotosBuffer, 'stationPhotoFile');
renderPhotoRow('anomalyPhotoRow', anomalyPhotosBuffer, 'anomalyPhotoFile');

/* ---------------- SAUVEGARDE ---------------- */
document.getElementById('saveStation').addEventListener('click', ()=>{
  const observers = parseInt(document.getElementById('observersInput').value||'1');
  const adults = parseInt(document.getElementById('adultsInput').value||'0');
  const aon = parseInt(document.getElementById('aonInput').value||'0');
  const notes = document.getElementById('stationNotes').value;
  observations[currentStation] = { observers, adults, aon, notes, photos:[...stationPhotosBuffer], timestamp: new Date().toISOString() };
  stationMarkers[currentStation].setIcon(makeStationIcon(currentStation, true));
  document.getElementById('doneCount').textContent = Object.keys(observations).length;
  closeSheets();
  showToast('Station ' + currentStation + ' enregistrée ✓');
});

document.getElementById('saveAnomaly').addEventListener('click', ()=>{
  const station = anomalySelect.value;
  const notes = document.getElementById('anomalyNotes').value;
  if(!notes.trim() && anomalyPhotosBuffer.length===0){
    showToast('Ajoute une description ou une photo');
    return;
  }
  anomalies.push({ station, notes, photos:[...anomalyPhotosBuffer], timestamp: new Date().toISOString() });
  closeSheets();
  showToast('Signalement envoyé pour la station ' + station);
});

/* ---------------- EXPORT ---------------- */
document.getElementById('exportBtn').addEventListener('click', ()=>{
  const payload = {
    exported_at: new Date().toISOString(),
    observations,
    anomalies
  };
  const blob = new Blob([JSON.stringify(payload, null, 2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'kittiwalk_export_' + new Date().toISOString().slice(0,10) + '.json';
  a.click();
  URL.revokeObjectURL(url);
});

/* ---------------- TOAST ---------------- */
let toastTimeout;
function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimeout);
  toastTimeout = setTimeout(()=> t.classList.remove('show'), 2400);
}

/* localisation initiale silencieuse */
locateMe(false);

/* PWA : service worker (uniquement en https, ex. GitHub Pages) */
if ('serviceWorker' in navigator && location.protocol === 'https:') {
  navigator.serviceWorker.register('sw.js').catch(()=>{});
}
</script>
