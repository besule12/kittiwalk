<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
<title>Kittiwalk — Tromsø</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#F1F1F1">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.css" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700&family=Roboto:wght@400;500&display=swap" rel="stylesheet">
<style>
  /* ====== Style calqué sur l'app Rissa Citizen Science ====== */
  :root{
    --bg:#F1F1F1;
    --ink:#2E3A47;
    --grey:#6E7680;
    --line:#C7CBD1;
    --card:#F1F1F1;
    --white:#FFFFFF;
    --ok:#4C8C6B;
    --accent:#5A6B7C;
    --field-radius:18px;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{height:100%; margin:0; padding:0; overscroll-behavior:none;}
  body{
    font-family:'Roboto',sans-serif;
    background:var(--bg);
    color:var(--ink);
    display:flex; flex-direction:column;
    height:100vh; width:100vw; overflow:hidden;
  }
  h1,h2,h3,.chunky{font-family:'Baloo 2',cursive;}

  /* ---------- HEADER (comme City Map) ---------- */
  header{
    position:absolute; top:0; left:0; right:0; z-index:1000;
    display:flex; align-items:center; justify-content:space-between;
    padding:10px 16px;
    background:rgba(241,241,241,0.96);
    border-bottom:1px solid rgba(0,0,0,0.05);
  }
  header .title{
    font-family:'Baloo 2',cursive;
    font-weight:700; font-size:26px; color:var(--ink);
    letter-spacing:.5px;
  }
  .stat-pill{
    background:var(--white); color:var(--ink);
    padding:7px 12px; border-radius:999px;
    font-size:13px; font-weight:500;
    border:1px solid var(--line);
  }
  .stat-pill b{color:var(--ok);}

  /* ---------- MAP ---------- */
  #map{flex:1; width:100%; height:100%;}
  .leaflet-container{background:#E4E7EA;}

  .station-marker{
    width:32px; height:32px; border-radius:50%;
    background:var(--ink); border:3px solid #fff;
    box-shadow:0 2px 6px rgba(0,0,0,0.3);
    display:flex; align-items:center; justify-content:center;
    font-family:'Roboto',sans-serif; font-size:10px; font-weight:700; color:#fff;
  }
  .station-marker.done{background:var(--ok);}

  .user-dot-outer{
    width:22px;height:22px;border-radius:50%;
    background:rgba(66,133,244,0.25);
    display:flex;align-items:center;justify-content:center;
  }
  .user-dot-inner{
    width:14px;height:14px;border-radius:50%;
    background:#4285F4; border:2.5px solid #fff;
    box-shadow:0 0 0 2px rgba(66,133,244,0.4);
  }

  /* ---------- BOUTONS FLOTTANTS ---------- */
  .fab{
    position:absolute; z-index:1000;
    border:1px solid var(--line);
    display:flex; align-items:center; justify-content:center;
    box-shadow:0 3px 10px rgba(0,0,0,0.18);
    cursor:pointer; background:var(--white); color:var(--ink);
  }
  #locateBtn{
    bottom:26px; right:16px;
    width:52px; height:52px; border-radius:50%; font-size:22px;
  }
  #anomalyBtn{
    bottom:26px; left:16px;
    height:48px; border-radius:999px; padding:0 18px;
    font-family:'Baloo 2',cursive; font-weight:600; font-size:15px; gap:8px;
  }
  #exportBtn{
    bottom:84px; left:16px;
    height:38px; border-radius:999px; padding:0 14px;
    font-size:12.5px; font-weight:500;
  }

  /* ---------- SHEET / CITY FORM ---------- */
  .sheet-backdrop{
    position:fixed; inset:0; z-index:1900;
    background:rgba(30,38,46,0.35);
    opacity:0; pointer-events:none;
    transition:opacity .25s ease;
  }
  .sheet-backdrop.open{opacity:1; pointer-events:auto;}
  .sheet{
    position:fixed; left:0; right:0; bottom:0; z-index:2000;
    background:var(--bg);
    border-radius:24px 24px 0 0;
    max-height:92vh; overflow-y:auto;
    transform:translateY(105%);
    transition:transform .28s cubic-bezier(.32,.72,0,1);
    box-shadow:0 -6px 24px rgba(0,0,0,0.18);
    padding:0 16px 28px;
  }
  .sheet.open{transform:translateY(0);}
  .sheet-handle{
    width:40px; height:5px; background:var(--line);
    border-radius:3px; margin:12px auto 2px;
  }
  .sheet-top{
    display:flex; align-items:center; justify-content:space-between;
    padding:6px 4px 2px;
  }
  .sheet-top h1{
    font-size:28px; font-weight:700; margin:0; color:var(--ink);
  }
  .close-x{
    background:none; border:none; width:36px; height:36px;
    font-size:20px; color:var(--ink); cursor:pointer;
  }

  /* Cartes de sections comme l'app d'origine */
  .card{
    background:var(--card);
    border:1px solid var(--line);
    border-radius:22px;
    padding:18px 16px 20px;
    margin-top:16px;
  }
  .card h3{
    font-size:22px; font-weight:700; margin:0 0 16px 4px; color:var(--ink);
  }
  .field-box{
    width:100%;
    background:var(--bg);
    border:1px solid var(--line);
    border-radius:var(--field-radius);
    padding:20px 18px;
    font-family:'Roboto',sans-serif;
    font-size:17px; color:var(--ink);
    margin-bottom:14px;
    outline:none;
    appearance:none;
  }
  .field-box::placeholder{color:var(--grey);}
  select.field-box{
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='14' height='9' viewBox='0 0 14 9'><path d='M1 1l6 6 6-6' stroke='%232E3A47' stroke-width='2' fill='none' stroke-linecap='round'/></svg>");
    background-repeat:no-repeat;
    background-position:right 18px center;
    color:var(--grey);
  }
  select.field-box.filled{color:var(--ink);}
  .field-box:last-child{margin-bottom:0;}

  /* Rangée champ + bouton compteur */
  .field-row{
    display:flex; gap:10px; align-items:stretch; margin-bottom:14px;
  }
  .field-row .field-box{margin-bottom:0; flex:1;}
  .tally-mini{
    flex-shrink:0; width:60px;
    border-radius:var(--field-radius);
    border:1px solid var(--line);
    background:var(--white);
    font-size:24px; cursor:pointer;
  }
  .field-row:last-child{margin-bottom:0;}

  .comment-wrap{position:relative;}
  .comment-wrap textarea{
    min-height:64px; resize:vertical; padding-right:74px;
  }
  .comment-wrap .count{
    position:absolute; top:20px; right:18px;
    color:var(--grey); font-size:15px;
  }

  .photo-row{display:flex; gap:10px; flex-wrap:wrap; margin-top:14px;}
  .photo-add{
    width:60px; height:60px; border-radius:16px;
    border:1.5px dashed var(--grey);
    display:flex; align-items:center; justify-content:center;
    font-size:22px; color:var(--grey); cursor:pointer; background:var(--bg);
  }
  .photo-thumb{
    width:60px; height:60px; border-radius:16px; object-fit:cover;
    border:1px solid var(--line);
  }

  .submit{
    display:block;
    width:60%;
    margin:24px auto 0;
    background:#DADDE0;
    color:var(--grey);
    border:none;
    padding:16px;
    border-radius:999px;
    font-family:'Baloo 2',cursive;
    font-weight:600; font-size:18px;
    cursor:pointer;
    transition:background .2s, color .2s;
  }
  .submit.ready{background:var(--ink); color:#fff;}

  .toast{
    position:fixed; bottom:30px; left:50%; transform:translateX(-50%);
    background:var(--ink); color:#fff; padding:12px 20px; border-radius:999px;
    font-size:13.5px; z-index:3000; opacity:0; pointer-events:none;
    transition:opacity .25s ease;
    font-family:'Baloo 2',cursive;
  }
  .toast.show{opacity:1;}

  /* ---------- COMPTEUR PLEIN ÉCRAN ---------- */
  #tallyOverlay{
    position:fixed; inset:0; z-index:5000;
    background:var(--ink);
    display:none; flex-direction:column; color:#fff;
  }
  #tallyOverlay.open{display:flex;}
  .tally-header{
    display:flex; justify-content:space-between; align-items:center;
    padding:18px 20px;
    font-family:'Baloo 2',cursive; font-size:18px; font-weight:600;
  }
  .tally-cancel{
    background:rgba(255,255,255,0.14); border:none; color:#fff;
    padding:10px 16px; border-radius:999px; font-size:14px; cursor:pointer;
    font-family:'Baloo 2',cursive;
  }
  .tally-zone{
    flex:1; display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    cursor:pointer; user-select:none; -webkit-user-select:none;
    touch-action:manipulation;
  }
  .tally-zone:active .tally-count{transform:scale(1.06);}
  .tally-count{
    font-family:'Baloo 2',cursive;
    font-size:120px; font-weight:700; line-height:1;
    transition:transform .08s ease;
  }
  .tally-hint{margin-top:16px; color:rgba(255,255,255,0.6); font-size:15px;}
  .tally-actions{display:flex; gap:12px; padding:0 20px 34px;}
  .tally-actions button{
    flex:1; padding:18px; border-radius:999px; border:none;
    font-family:'Baloo 2',cursive; font-weight:700; font-size:17px; cursor:pointer;
  }
  .tally-undo{background:rgba(255,255,255,0.14); color:#fff;}
  .tally-done{background:#fff; color:var(--ink);}
</style>
</head>
<body>

<header>
  <div class="title">City Map</div>
  <div class="stat-pill"><b id="doneCount">0</b>/<span id="totalCount">43</span> stations</div>
</header>

<div id="map"></div>

<button class="fab" id="locateBtn" title="Me localiser">📍</button>
<button class="fab" id="anomalyBtn">📷 Report</button>
<button class="fab" id="exportBtn">⬇ Export JSON</button>

<div class="sheet-backdrop" id="backdrop"></div>

<!-- ============ CITY FORM (copie de l'app Rissa + compteur) ============ -->
<div class="sheet" id="stationSheet">
  <div class="sheet-handle"></div>
  <div class="sheet-top">
    <h1>City Form</h1>
    <button class="close-x" id="closeStation">✕</button>
  </div>

  <div class="card">
    <h3>Basic information</h3>
    <input class="field-box" id="observersInput" type="number" inputmode="numeric" min="1" placeholder="How many are you today?">
    <select class="field-box" id="stationSelect">
      <option value="" disabled selected>What station are you at?</option>
    </select>
  </div>

  <div class="card">
    <h3>Observation details</h3>
    <div class="field-row">
      <input class="field-box" id="adultsInput" type="number" inputmode="numeric" min="0" placeholder="Number of visible adults">
      <button type="button" class="tally-mini" data-tally="adults" title="Compter un par un">👆</button>
    </div>
    <div class="field-row">
      <input class="field-box" id="aonInput" type="number" inputmode="numeric" min="0" placeholder="Number of occupied nests">
      <button type="button" class="tally-mini" data-tally="aon" title="Compter un par un">👆</button>
    </div>
  </div>

  <div class="card">
    <h3>Additional information</h3>
    <div class="comment-wrap">
      <textarea class="field-box" id="stationNotes" maxlength="100" placeholder="Comments (optional)"></textarea>
      <span class="count" id="charCount">0/100</span>
    </div>
    <div class="photo-row" id="stationPhotoRow"></div>
  </div>

  <button class="submit" id="saveStation">Submit</button>
</div>

<!-- ============ SIGNALEMENT ANOMALIE ============ -->
<div class="sheet" id="anomalySheet">
  <div class="sheet-handle"></div>
  <div class="sheet-top">
    <h1>Report</h1>
    <button class="close-x" id="closeAnomaly">✕</button>
  </div>
  <div class="card">
    <h3>What did you see?</h3>
    <select class="field-box" id="anomalyStation">
      <option value="" disabled selected>Closest station</option>
    </select>
    <div class="comment-wrap">
      <textarea class="field-box" id="anomalyNotes" placeholder="Injured bird, destroyed nest, disturbance..."></textarea>
    </div>
    <div class="photo-row" id="anomalyPhotoRow"></div>
  </div>
  <button class="submit ready" id="saveAnomaly">Submit</button>
</div>

<div class="toast" id="toast"></div>

<!-- ============ COMPTEUR PLEIN ÉCRAN ============ -->
<div id="tallyOverlay">
  <div class="tally-header">
    <div id="tallyWhat">Adults</div>
    <button class="tally-cancel" id="tallyCancel">Annuler</button>
  </div>
  <div class="tally-zone" id="tallyZone">
    <div class="tally-count" id="tallyCount">0</div>
    <div class="tally-hint">Touche l'écran à chaque oiseau 🐦</div>
  </div>
  <div class="tally-actions">
    <button class="tally-undo" id="tallyUndo">− 1</button>
    <button class="tally-done" id="tallyDone">Valider</button>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.js"></script>
<script>
/* ---------------- STATIONS (fusion QGIS 2024/2025, WGS84) ---------------- */
const STATIONS = [{"station": "01", "lat": 69.647982, "lon": 18.96033}, {"station": "02", "lat": 69.648305, "lon": 18.959777}, {"station": "02b", "lat": 69.648666, "lon": 18.959894}, {"station": "03", "lat": 69.648628, "lon": 18.960329}, {"station": "04", "lat": 69.648661, "lon": 18.961516}, {"station": "06a", "lat": 69.650702, "lon": 18.960079}, {"station": "08", "lat": 69.650555, "lon": 18.958684}, {"station": "08b", "lat": 69.650767, "lon": 18.958919}, {"station": "09", "lat": 69.651979, "lon": 18.962027}, {"station": "10", "lat": 69.652079, "lon": 18.962743}, {"station": "11", "lat": 69.652025, "lon": 18.962372}, {"station": "12", "lat": 69.652449, "lon": 18.96237}, {"station": "13a", "lat": 69.652296, "lon": 18.961903}, {"station": "13b", "lat": 69.652201, "lon": 18.961444}, {"station": "14", "lat": 69.65237, "lon": 18.96045}, {"station": "15", "lat": 69.652456, "lon": 18.958719}, {"station": "16", "lat": 69.650309, "lon": 18.957028}, {"station": "16a", "lat": 69.650144, "lon": 18.955643}, {"station": "16b", "lat": 69.650632, "lon": 18.957665}, {"station": "16c", "lat": 69.650345, "lon": 18.957454}, {"station": "16d", "lat": 69.649902, "lon": 18.955921}, {"station": "17", "lat": 69.650031, "lon": 18.957869}, {"station": "19", "lat": 69.650292, "lon": 18.957953}, {"station": "20b", "lat": 69.649141, "lon": 18.958449}, {"station": "20c", "lat": 69.648985, "lon": 18.958244}, {"station": "20d", "lat": 69.648982, "lon": 18.958965}, {"station": "20e", "lat": 69.648778, "lon": 18.958919}, {"station": "21", "lat": 69.649016, "lon": 18.959806}, {"station": "22", "lat": 69.648759, "lon": 18.956821}, {"station": "24", "lat": 69.646091, "lon": 18.951096}, {"station": "25", "lat": 69.64575, "lon": 18.952222}, {"station": "26b", "lat": 69.645631, "lon": 18.953353}, {"station": "28", "lat": 69.64671, "lon": 18.95564}, {"station": "28b", "lat": 69.64634, "lon": 18.95511}, {"station": "30", "lat": 69.643959, "lon": 18.944063}, {"station": "31", "lat": 69.644116, "lon": 18.943943}, {"station": "31a", "lat": 69.644433, "lon": 18.944733}, {"station": "31b", "lat": 69.644565, "lon": 18.942862}, {"station": "31c", "lat": 69.644696, "lon": 18.942067}, {"station": "32", "lat": 69.644522, "lon": 18.945281}, {"station": "32c", "lat": 69.643741, "lon": 18.945634}, {"station": "33", "lat": 69.642658, "lon": 18.943864}, {"station": "34", "lat": 69.642309, "lon": 18.942534}];

/* ---------------- ÉTAT ---------------- */
let observations = {};
let anomalies = [];
let stationMarkers = {};
let stationPhotosBuffer = [];
let anomalyPhotosBuffer = [];

/* ---------------- CARTE ---------------- */
const map = L.map('map', { zoomControl:false }).setView(
  [STATIONS.reduce((s,x)=>s+x.lat,0)/STATIONS.length, STATIONS.reduce((s,x)=>s+x.lon,0)/STATIONS.length],
  15
);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom: 19,
  attribution: '&copy; OpenStreetMap contributors'
}).addTo(map);
L.control.zoom({position:'bottomright'}).addTo(map);

function makeStationIcon(code, done){
  return L.divIcon({
    className:'',
    html:`<div class="station-marker ${done?'done':''}">${code}</div>`,
    iconSize:[32,32], iconAnchor:[16,16]
  });
}
STATIONS.forEach(st=>{
  const m = L.marker([st.lat, st.lon], { icon: makeStationIcon(st.station,false) }).addTo(map);
  m.on('click', ()=> openStationSheet(st.station));
  stationMarkers[st.station] = m;
});
document.getElementById('totalCount').textContent = STATIONS.length;

/* Remplir les 2 selects de stations */
const stationSelect = document.getElementById('stationSelect');
const anomalySelect = document.getElementById('anomalyStation');
STATIONS.forEach(st=>{
  [stationSelect, anomalySelect].forEach(sel=>{
    const o = document.createElement('option');
    o.value = st.station; o.textContent = 'Station ' + st.station;
    sel.appendChild(o);
  });
});
[stationSelect, anomalySelect].forEach(sel=>{
  sel.addEventListener('change', ()=> sel.classList.add('filled'));
});

/* ---------------- GÉOLOCALISATION ---------------- */
let userMarker = null;
function updateUserPosition(lat, lon){
  const icon = L.divIcon({
    className:'',
    html:`<div class="user-dot-outer"><div class="user-dot-inner"></div></div>`,
    iconSize:[22,22], iconAnchor:[11,11]
  });
  if(!userMarker){ userMarker = L.marker([lat,lon],{icon, zIndexOffset:1000}).addTo(map); }
  else { userMarker.setLatLng([lat,lon]); }
}
function locateMe(recenter){
  if(!navigator.geolocation){ showToast("Géolocalisation indisponible"); return; }
  navigator.geolocation.getCurrentPosition(pos=>{
    updateUserPosition(pos.coords.latitude, pos.coords.longitude);
    if(recenter) map.setView([pos.coords.latitude, pos.coords.longitude], 17);
  }, err=> showToast("Localisation impossible : " + err.message), {enableHighAccuracy:true});
}
if(navigator.geolocation){
  navigator.geolocation.watchPosition(
    pos=> updateUserPosition(pos.coords.latitude, pos.coords.longitude),
    ()=>{}, {enableHighAccuracy:true});
}
document.getElementById('locateBtn').addEventListener('click', ()=> locateMe(true));

/* ---------------- SHEETS ---------------- */
const backdrop = document.getElementById('backdrop');
const stationSheet = document.getElementById('stationSheet');
const anomalySheet = document.getElementById('anomalySheet');
function openSheet(el){ backdrop.classList.add('open'); el.classList.add('open'); }
function closeSheets(){
  backdrop.classList.remove('open');
  stationSheet.classList.remove('open');
  anomalySheet.classList.remove('open');
}
backdrop.addEventListener('click', closeSheets);
document.getElementById('closeStation').addEventListener('click', closeSheets);
document.getElementById('closeAnomaly').addEventListener('click', closeSheets);

function openStationSheet(code){
  stationSelect.value = code;
  stationSelect.classList.add('filled');
  const ex = observations[code];
  document.getElementById('observersInput').value = ex ? ex.observers : '';
  document.getElementById('adultsInput').value = ex ? ex.adults : '';
  document.getElementById('aonInput').value = ex ? ex.aon : '';
  document.getElementById('stationNotes').value = ex ? ex.notes : '';
  updateCharCount();
  stationPhotosBuffer = ex ? [...ex.photos] : [];
  renderPhotoRow('stationPhotoRow', stationPhotosBuffer, 'stationPhotoFile');
  updateSubmitState();
  openSheet(stationSheet);
}

document.getElementById('anomalyBtn').addEventListener('click', ()=>{
  anomalyPhotosBuffer = [];
  document.getElementById('anomalyNotes').value = '';
  renderPhotoRow('anomalyPhotoRow', anomalyPhotosBuffer, 'anomalyPhotoFile');
  openSheet(anomalySheet);
});

/* ---------------- CHAMPS ---------------- */
function updateCharCount(){
  document.getElementById('charCount').textContent =
    document.getElementById('stationNotes').value.length + '/100';
}
document.getElementById('stationNotes').addEventListener('input', updateCharCount);

function updateSubmitState(){
  const ready = stationSelect.value !== '';
  document.getElementById('saveStation').classList.toggle('ready', ready);
}
stationSelect.addEventListener('change', updateSubmitState);

['observersInput','adultsInput','aonInput'].forEach(id=>{
  const el = document.getElementById(id);
  el.addEventListener('blur', ()=>{
    if(el.value === '') return;
    const min = id==='observersInput' ? 1 : 0;
    let v = parseInt(el.value);
    if(isNaN(v) || v < min) v = min;
    el.value = v;
  });
  el.addEventListener('focus', ()=> el.select());
});

/* ---------------- COMPTEUR CLICKER ---------------- */
let tallyTarget = null, tallyValue = 0;
const tallyOverlay = document.getElementById('tallyOverlay');
const tallyCountEl = document.getElementById('tallyCount');

document.querySelectorAll('.tally-mini').forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tallyTarget = btn.dataset.tally;
    tallyValue = parseInt(document.getElementById(tallyTarget+'Input').value || '0') || 0;
    tallyCountEl.textContent = tallyValue;
    document.getElementById('tallyWhat').textContent =
      tallyTarget==='adults' ? 'Visible adults' : 'Occupied nests';
    tallyOverlay.classList.add('open');
  });
});
document.getElementById('tallyZone').addEventListener('click', ()=>{
  tallyValue++;
  tallyCountEl.textContent = tallyValue;
  if(navigator.vibrate) navigator.vibrate(15);
});
document.getElementById('tallyUndo').addEventListener('click', ()=>{
  if(tallyValue>0) tallyValue--;
  tallyCountEl.textContent = tallyValue;
  if(navigator.vibrate) navigator.vibrate([10,30,10]);
});
document.getElementById('tallyDone').addEventListener('click', ()=>{
  document.getElementById(tallyTarget+'Input').value = tallyValue;
  tallyOverlay.classList.remove('open');
});
document.getElementById('tallyCancel').addEventListener('click', ()=>{
  tallyOverlay.classList.remove('open');
});

/* ---------------- PHOTOS (mémoire de session) ---------------- */
function renderPhotoRow(rowId, buffer, fileInputId){
  const row = document.getElementById(rowId);
  row.innerHTML = '';
  buffer.forEach((src,i)=>{
    const img = document.createElement('img');
    img.className='photo-thumb'; img.src=src;
    img.addEventListener('click', ()=>{ buffer.splice(i,1); renderPhotoRow(rowId,buffer,fileInputId); });
    row.appendChild(img);
  });
  const add = document.createElement('label');
  add.className='photo-add';
  add.innerHTML='📷<input type="file" accept="image/*" capture="environment" multiple style="display:none" id="'+fileInputId+'">';
  row.appendChild(add);
  document.getElementById(fileInputId).addEventListener('change',(e)=>{
    [...e.target.files].forEach(f=>{
      const r = new FileReader();
      r.onload = ()=>{ buffer.push(r.result); renderPhotoRow(rowId,buffer,fileInputId); };
      r.readAsDataURL(f);
    });
  });
}
renderPhotoRow('stationPhotoRow', stationPhotosBuffer, 'stationPhotoFile');
renderPhotoRow('anomalyPhotoRow', anomalyPhotosBuffer, 'anomalyPhotoFile');

/* ---------------- SAUVEGARDE ---------------- */
document.getElementById('saveStation').addEventListener('click', ()=>{
  const code = stationSelect.value;
  if(!code){ showToast('Choisis une station'); return; }
  observations[code] = {
    observers: parseInt(document.getElementById('observersInput').value||'1') || 1,
    adults: parseInt(document.getElementById('adultsInput').value||'0') || 0,
    aon: parseInt(document.getElementById('aonInput').value||'0') || 0,
    notes: document.getElementById('stationNotes').value,
    photos: [...stationPhotosBuffer],
    timestamp: new Date().toISOString()
  };
  stationMarkers[code].setIcon(makeStationIcon(code, true));
  document.getElementById('doneCount').textContent = Object.keys(observations).length;
  closeSheets();
  showToast('Station ' + code + ' enregistrée ✓');
});

document.getElementById('saveAnomaly').addEventListener('click', ()=>{
  const st = anomalySelect.value;
  const notes = document.getElementById('anomalyNotes').value;
  if(!st){ showToast('Choisis la station la plus proche'); return; }
  if(!notes.trim() && anomalyPhotosBuffer.length===0){
    showToast('Ajoute une description ou une photo'); return;
  }
  anomalies.push({ station:st, notes, photos:[...anomalyPhotosBuffer], timestamp:new Date().toISOString() });
  closeSheets();
  showToast('Signalement enregistré — station ' + st);
});

/* ---------------- EXPORT JSON ---------------- */
document.getElementById('exportBtn').addEventListener('click', ()=>{
  const payload = { exported_at:new Date().toISOString(), observations, anomalies };
  const blob = new Blob([JSON.stringify(payload,null,2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'kittiwalk_' + new Date().toISOString().slice(0,10) + '.json';
  a.click();
  URL.revokeObjectURL(url);
  showToast('Données exportées — pense à les envoyer !');
});

/* ---------------- TOAST ---------------- */
let toastTimeout;
function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimeout);
  toastTimeout = setTimeout(()=> t.classList.remove('show'), 2400);
}

locateMe(false);

/* PWA */
if('serviceWorker' in navigator && location.protocol === 'https:'){
  navigator.serviceWorker.register('sw.js').catch(()=>{});
}
</script>
